name: Build & Deploy
on:
  push:
    branches: [main, platform]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=platform,enable=${{ github.ref == 'refs/heads/platform' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

  deploy:
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
        - name: Trigger Coolify redeploy
          env:
            WEBHOOK_MAIN: ${{ secrets.COOLIFY_WEBHOOK }}
            WEBHOOK_PLATFORM: ${{ secrets.COOLIFY_WEBHOOK_PLATFORM }}
            COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          run: |
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              WEBHOOK="$WEBHOOK_MAIN"
            else
              WEBHOOK="$WEBHOOK_PLATFORM"
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              -X GET "$WEBHOOK" \
              -H "Authorization: Bearer $COOLIFY_TOKEN"
