production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  refresh_materialized_all_signups:
    class: RefreshMaterializedAllSignupsJob
    schedule: every 2 minutes
    concurrency: 1
    description: "Refresh materialized_all_signups reporting view every 2 minutes (concurrent refresh)"

  sync_user_to_airtable:
    class: Airtable::UserSyncJob
    schedule: every minute
    concurrency: 1
    description: "Sync user data to Airtable every minute with single execution limit"

  sync_rsvp_to_airtable:
    class: Airtable::RsvpSyncJob
    schedule: every minute
    concurrency: 1
    description: "Sync RSVPs to Airtable every minute with single execution limit"

  sync_devlog_to_airtable:
    class: Airtable::DevlogSyncJob
    schedule: every minute
    concurrency: 1
    description: "Sync devlogs to Airtable every minute with single execution limit"

  sync_project_to_airtable:
    class: Airtable::ProjectSyncJob
    schedule: every minute
    concurrency: 1
    description: "Sync projects to Airtable every minute with single execution limit"

  sync_ship_event_to_airtable:
    class: Airtable::ShipEventSyncJob
    schedule: every minute
    concurrency: 1
    description: "Sync ship events to Airtable every minute with single execution limit"

  shop_process_warehouse_orders:
    class: Shop::ProcessWarehouseOrdersJob
    schedule: every 2 days
    concurrency: 1
    description: "Process warehouse orders every 2 days with single execution limit"

  shop_refresh_verification_status:
    class: Shop::RefreshVerificationStatusJob
    schedule: every hour
    concurrency: 1
    description: "Refresh verification status for users with orders awaiting verification"

  refresh_all_users_verification:
    class: RefreshAllUsersVerificationJob
    schedule: every Sunday at 3am
    concurrency: 1
    description: "Weekly refresh of verification status for all users with linked identities"

  cache_sitemap:
    class: Cache::SitemapJob
    args: [{ force: true }]
    schedule: every hour
    concurrency: 1
    description: "Refresh sitemap XML cache"

  # sync_git_commits:
  #   class: GitCommitSyncJob
  #   schedule: every hour
  #   concurrency: 1
  #   description: "Sync git commits from project repos to timeline"

  recalculate_project_durations:
    class: RecalculateProjectDurationsJob
    schedule: every hour
    concurrency: 1
    description: "Recalculate duration_seconds for all projects"

  sync_pyramid_enriched_refs:
    class: SyncPyramidEnrichedRefsJob
    schedule: every hour
    concurrency: 1
    description: "Get valid referral codes from Pyramid Scheme and update records"

  process_demo_broken_reports:
    class: ProcessDemoBrokenReportsJob
    schedule: every 30 minutes
    concurrency: 1
    description: "Process demo_broken reports: auto-review and re-certify projects with 5+ pending, notify Slack for 15+ total"

  rsvp_daily_summary:
    class: RsvpDailySummaryJob
    schedule: every day at 10am America/New_York
    concurrency: 1
    description: "Send daily RSVP summary to Slack with signups, ref breakdown, and game stats"

  fraud_daily_summary:
    class: FraudDailySummaryJob
    schedule: every day at 8pm America/New_York
    concurrency: 1
    description: "Send daily fraud summary to Slack with stats on shop orders and reports"

  shop_order_daily_summary:
    class: ShopOrderDailySummaryJob
    schedule: every day at 7pm Europe/London
    concurrency: 1
    description: "Send daily shop order summary to Slack with backlog, assignments, and hang times"

  shop_retry_free_sticker_orders:
    class: Shop::RetryFreeStickerOrdersJob
    schedule: every day at 6am UTC
    concurrency: 1
    description: "Retry fulfillment for free sticker orders stuck in pending"

  shop_calculate_fulfillment_payouts:
    class: Shop::CalculateFulfillmentPayoutsJob
    schedule: every Friday at 12pm Europe/London
    concurrency: 1
    description: "Calculate weekly fulfillment payouts (3 tickets per fulfilled order)"

  support_vibecheck_est:
    class: SupportVibecheckJob
    schedule: every day at 12pm America/New_York
    concurrency: 1
    description: "Run support vibecheck at 12pm EST"

  refresh_user_verdicts:
    class: User::RefreshVerdictsJob
    schedule: every 12 hours
    concurrency: 1
    description: "Recompute vote quality scores and update blessed/cursed/neutral verdicts for all voters"

  cleanup_guest_users:
    class: CleanupGuestUsersJob
    schedule: every day at 4am America/New_York
    concurrency: 1
    description: "Hard-delete guest users (no HCA identity) older than 30 days"

  refresh_approx_balances:
    class: RefreshApproxBalancesJob
    schedule: every day at 5am UTC
    concurrency: 1
    description: "Recalculate approx_balance and approx_total_earned from ledger entries"

  certification_ysws_airtable_resync:
    class: Certification::YswsAirtableResyncJob
    schedule: every day at 4pm America/New_York
    concurrency: 1
    description: "Enqueue airtable sync for reviews where sync initially failed"

  ahoy_backfill_project_created_ahoy_events:
    class: AhoyBackfillProjectCreatedJob
    schedule: every day at 5am America/New_York
    concurrency: 1
    description: "Backfill missing ahoy events from DB tables for funnel tracking"
